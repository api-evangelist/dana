description: >-
  Dana Incorporated is a global supplier of fully integrated drivetrain and
  electrified propulsion systems for passenger vehicles, commercial trucks,
  and off-highway equipment. Dana operates a developer portal at
  developer.danaaftermarket.com offering eight APIs for aftermarket parts
  search, availability, pricing, ordering, and shipment tracking across its
  global distribution network.
