    description: >-
      The Dana Aftermarket API provides programmatic access to Dana's
      aftermarket e-commerce platform with eight active APIs including advanced
      shipping notification, availability, deep linking, order status, part
      details, part search by application, place order, and pricing. The APIs
      enable customers to display inventory availability from Dana's global
      distribution network, obtain real-time quotes, and manage orders with
      confirmation, shipping details, packing slips, and tracking numbers.
